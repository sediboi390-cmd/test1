<!DOCTYPE html>
<!-- Story Sheet Maker v1.0 — calm storyboard sheet composer — 2026-05-27 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Story Sheet Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F6F1E8;   /* warm cream */
    --bg-soft:   #EFE8DA;   /* slightly darker cream */
    --surface:   #FFFFFF;
    --border:    #E5DCC9;   /* warm tan border */
    --border-2:  #D8CDB8;
    --text:      #3A3A3A;
    --muted:     #8B857A;
    --dim:       #B5AE9E;
    --sage:      #7FA59A;   /* calming sage-teal */
    --sage-dark: #6B9286;
    --sage-soft: #E5EFEC;
    --rose:      #D9A89A;   /* warm dusty rose accent */
    --rose-dark: #C49384;
    --rose-soft: #F4E8E3;
    --warn:      #C77E5E;
    --shadow-sm: 0 1px 3px rgba(58,58,58,0.04);
    --shadow:    0 4px 14px rgba(58,58,58,0.06);
    --shadow-lg: 0 10px 30px rgba(58,58,58,0.08);
    --r:         10px;
    --r-lg:      14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ━━━━━━━━ Header ━━━━━━━━ */
  .top {
    padding: 28px 28px 0;
    max-width: 1240px;
    margin: 0 auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--sage) 0%, var(--rose) 100%);
    box-shadow: var(--shadow-sm);
  }
  .brand-name {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .brand-sub {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-left: 2px;
  }

  .title-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .project-title {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1.5rem, 3.6vw, 2.2rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    padding: 4px 0;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    min-width: 200px;
    flex: 1;
    max-width: 600px;
  }
  .project-title:hover, .project-title:focus { border-bottom-color: var(--border-2); }
  .panel-count {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .panel-count b { color: var(--text); font-weight: 600; }

  .tagline {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--muted);
    max-width: 620px;
    line-height: 1.6;
  }

  /* ━━━━━━━━ Toolbar ━━━━━━━━ */
  .toolbar {
    margin: 24px auto 0;
    max-width: 1240px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 18px 22px;
    box-shadow: var(--shadow-sm);
  }
  .tool {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .tool-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tool select, .tool .seg {
    font-family: inherit;
    font-size: 0.78rem;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .tool select:hover, .tool select:focus { border-color: var(--sage); }
  .seg { display: inline-flex; padding: 2px; gap: 2px; }
  .seg button {
    font-family: inherit;
    font-size: 0.7rem;
    background: transparent;
    border: none;
    padding: 4px 10px;
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.13s;
  }
  .seg button.on { background: var(--sage-soft); color: var(--sage-dark); font-weight: 500; }
  .seg button:hover:not(.on) { color: var(--text); }

  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: var(--text);
    cursor: pointer;
    user-select: none;
  }
  .toggle input { display: none; }
  .toggle-track {
    width: 32px; height: 18px;
    background: var(--border-2);
    border-radius: 999px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--surface);
    border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .toggle input:checked + .toggle-track { background: var(--sage); }
  .toggle input:checked + .toggle-track::after { transform: translateX(14px); }

  .spacer { flex: 1; min-width: 12px; }

  .btn {
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--sage); color: var(--sage-dark); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  .btn.ghost:hover { color: var(--warn); background: transparent; border-color: transparent; }
  .btn.primary {
    background: var(--sage);
    border-color: var(--sage);
    color: #fff;
    padding: 10px 22px;
    font-weight: 600;
    letter-spacing: 0.02em;
    box-shadow: 0 2px 6px rgba(127,165,154,0.25);
  }
  .btn.primary:hover { background: var(--sage-dark); border-color: var(--sage-dark); color: #fff; }

  /* ━━━━━━━━ Grid of panels ━━━━━━━━ */
  main {
    max-width: 1240px;
    margin: 24px auto 120px;
    padding: 0 28px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: all 0.18s ease;
    animation: rise 0.32s ease both;
    display: flex;
    flex-direction: column;
  }
  .panel:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-img {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--bg-soft);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .panel-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .panel-img.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    color: var(--dim);
    border: 2px dashed var(--border-2);
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    margin: -1px -1px 0;
  }
  .panel-img.empty:hover { border-color: var(--sage); color: var(--sage); background: var(--sage-soft); }
  .panel-img.empty .icon { font-size: 1.4rem; opacity: 0.7; }
  .panel-img.empty .lbl { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; }

  .panel-num {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    background: rgba(255,255,255,0.94);
    color: var(--sage-dark);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    backdrop-filter: blur(4px);
  }

  .panel-tools {
    position: absolute;
    top: 10px; right: 10px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .panel:hover .panel-tools { opacity: 1; }
  .ptool {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: rgba(255,255,255,0.94);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    transition: all 0.13s;
  }
  .ptool:hover { color: var(--sage-dark); border-color: var(--sage); }
  .ptool.del:hover { color: var(--warn); border-color: var(--warn); }

  .panel-body {
    padding: 12px 14px 14px;
  }
  .caption-input {
    width: 100%;
    font-family: inherit;
    font-size: 0.82rem;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    padding: 4px 0;
    outline: none;
    transition: border-color 0.15s;
  }
  .caption-input::placeholder { color: var(--dim); font-style: italic; }
  .caption-input:hover, .caption-input:focus { border-bottom-color: var(--border-2); }

  /* Add card */
  .add-card {
    background: transparent;
    border: 2px dashed var(--border-2);
    border-radius: var(--r-lg);
    aspect-ratio: 16 / 9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    font-family: inherit;
    width: 100%;
    min-height: 180px;
  }
  .add-card:hover {
    border-color: var(--sage);
    color: var(--sage-dark);
    background: var(--sage-soft);
  }
  .add-card .plus { font-size: 1.8rem; line-height: 1; opacity: 0.8; }
  .add-card .lbl { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }

  /* ━━━━━━━━ Empty state ━━━━━━━━ */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state h2 {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 10px;
  }
  .empty-state p {
    font-size: 0.88rem;
    max-width: 480px;
    margin: 0 auto 24px;
    line-height: 1.65;
  }
  .empty-state .btn { padding: 12px 26px; font-size: 0.85rem; }

  /* ━━━━━━━━ Floating Done bar ━━━━━━━━ */
  .done-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 8px 8px 22px;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 50;
    animation: rise 0.4s ease both;
  }
  .done-bar .meta {
    font-size: 0.74rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .done-bar .meta b { color: var(--text); font-weight: 600; }
  .done-bar .btn.primary { padding: 10px 22px; }

  /* ━━━━━━━━ Result modal ━━━━━━━━ */
  .modal-veil {
    position: fixed; inset: 0;
    background: rgba(58,58,58,0.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fade 0.2s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    max-width: 1100px;
    width: 100%;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: rise 0.25s ease both;
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .modal-head h3 {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
  }
  .modal-head .sub {
    font-size: 0.74rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .modal-body {
    flex: 1;
    overflow: auto;
    padding: 24px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-body img {
    max-width: 100%;
    max-height: 70vh;
    border-radius: var(--r);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .modal-foot {
    display: flex;
    gap: 10px;
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    align-items: center;
    background: var(--surface);
  }
  .modal-foot .spacer { flex: 1; }

  /* ━━━━━━━━ Toast ━━━━━━━━ */
  .toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.78rem;
    letter-spacing: 0.02em;
    opacity: 0;
    transition: all 0.25s ease;
    z-index: 60;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ━━━━━━━━ Responsive tweaks ━━━━━━━━ */
  @media (max-width: 640px) {
    .top, main { padding-left: 18px; padding-right: 18px; }
    .toolbar { gap: 14px; padding: 12px 14px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .done-bar { padding: 6px 6px 6px 18px; gap: 10px; }
    .done-bar .meta { display: none; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="brand-mark"></div>
    <div class="brand-name">Story Sheet</div>
    <div class="brand-sub">Maker</div>
  </div>
  <div class="title-row">
    <input class="project-title" id="projectTitle" placeholder="Untitled story sheet" maxlength="80"/>
    <span class="panel-count"><b id="panelCount">0</b> panels</span>
  </div>
  <p class="tagline">Add images one by one in the order you want. When you're done, hit Compose Sheet — every image becomes one clean sheet you can save or share.</p>
</header>

<section class="toolbar">
  <div class="tool">
    <div class="tool-label">Aspect</div>
    <select id="aspect">
      <option value="16:9">16 : 9 — Cinema</option>
      <option value="4:3">4 : 3 — Classic</option>
      <option value="1:1">1 : 1 — Square</option>
      <option value="9:16">9 : 16 — Vertical</option>
    </select>
  </div>

  <div class="tool">
    <div class="tool-label">Columns</div>
    <div class="seg" id="cols">
      <button data-cols="auto" class="on">Auto</button>
      <button data-cols="2">2</button>
      <button data-cols="3">3</button>
      <button data-cols="4">4</button>
    </div>
  </div>

  <div class="tool">
    <div class="tool-label">Spacing</div>
    <div class="seg" id="gap">
      <button data-gap="tight">Tight</button>
      <button data-gap="normal" class="on">Normal</button>
      <button data-gap="airy">Airy</button>
    </div>
  </div>

  <label class="toggle">
    <input type="checkbox" id="showNumbers" checked/>
    <span class="toggle-track"></span>
    <span>Numbers</span>
  </label>

  <label class="toggle">
    <input type="checkbox" id="showCaptions" checked/>
    <span class="toggle-track"></span>
    <span>Captions</span>
  </label>

  <div class="spacer"></div>

  <button class="btn ghost" id="btnReset" title="Clear all panels">Reset</button>
</section>

<main>
  <div id="board"></div>
</main>

<div class="done-bar" id="doneBar" style="display:none">
  <div class="meta"><b id="doneCount">0</b> panels ready</div>
  <button class="btn primary" id="btnDone">Done — Compose Sheet</button>
</div>

<div class="toast" id="toast">Saved</div>

<!-- Modal mounts here -->
<div id="modalMount"></div>

<script>
'use strict';

/* ════════════════════════════════════════════════
   Story Sheet Maker — single file app
   ════════════════════════════════════════════════ */

const STORAGE_KEY = 'storySheet.project.v1';

const App = {
  project: {
    title: '',
    aspect: '16:9',
    cols: 'auto',
    gap: 'normal',
    showNumbers: true,
    showCaptions: true,
    panels: [],   // { id, image (dataUrl), caption }
  },
};

/* ─── helpers ─── */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c =>
  ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

const ASPECTS = {
  '16:9': { w: 16, h: 9 },
  '4:3':  { w: 4, h: 3 },
  '1:1':  { w: 1, h: 1 },
  '9:16': { w: 9, h: 16 },
};

const GAPS = { tight: 8, normal: 18, airy: 32 };

/* ─── persistence ─── */
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(App.project)); }
  catch (e) {
    if (e && e.name === 'QuotaExceededError') {
      flashToast('Storage full — try fewer or smaller images', true);
    } else {
      console.warn('Save failed:', e);
    }
  }
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const p = JSON.parse(raw);
    if (p && Array.isArray(p.panels)) {
      Object.assign(App.project, {
        title: p.title || '',
        aspect: p.aspect || '16:9',
        cols: p.cols || 'auto',
        gap: p.gap || 'normal',
        showNumbers: p.showNumbers !== false,
        showCaptions: p.showCaptions !== false,
        panels: p.panels.map(x => ({
          id: x.id || uid(),
          image: x.image || null,
          caption: x.caption || '',
        })),
      });
      return true;
    }
  } catch (e) { console.warn('Load failed:', e); }
  return false;
}

/* ─── state mutations ─── */
function addPanel(image) {
  App.project.panels.push({ id: uid(), image: image || null, caption: '' });
  save(); render();
}
function removePanel(id) {
  if (!confirm('Remove this panel?')) return;
  App.project.panels = App.project.panels.filter(p => p.id !== id);
  save(); render();
}
function movePanel(id, dir) {
  const i = App.project.panels.findIndex(p => p.id === id);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= App.project.panels.length) return;
  const arr = App.project.panels;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  save(); render();
}
function setCaption(id, value) {
  const p = App.project.panels.find(x => x.id === id);
  if (!p) return;
  p.caption = value;
  save();
}
function reset() {
  if (App.project.panels.length === 0) return;
  if (!confirm('Clear all panels and start over?')) return;
  App.project.panels = [];
  App.project.title = '';
  save(); render();
}

/* ─── image upload (single panel) ─── */
function chooseImageFor(targetId) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (!f.type.startsWith('image/')) { alert('Please choose an image file.'); return; }
    if (f.size > 1.5 * 1024 * 1024) {
      if (!confirm('That image is over 1.5MB. Storing several large images may exceed browser storage. Continue?')) return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (targetId === '__new__') {
        addPanel(ev.target.result);
      } else {
        const p = App.project.panels.find(x => x.id === targetId);
        if (p) { p.image = ev.target.result; save(); render(); }
      }
      flashToast('Image added');
    };
    reader.onerror = () => alert('Could not read this image.');
    reader.readAsDataURL(f);
  };
  inp.click();
}

/* allow multi-file pick from the "+ Add panel" tile */
function chooseMultiImages() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.multiple = true;
  inp.onchange = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    let totalBig = files.filter(f => f.size > 1.5 * 1024 * 1024).length;
    if (totalBig > 0) {
      if (!confirm(`${totalBig} of these images are over 1.5MB. Storing several large images may exceed browser storage. Continue?`)) return;
    }
    let pending = files.length;
    files.forEach((f) => {
      if (!f.type.startsWith('image/')) { pending--; return; }
      const reader = new FileReader();
      reader.onload = (ev) => {
        App.project.panels.push({ id: uid(), image: ev.target.result, caption: '' });
        pending--;
        if (pending === 0) { save(); render(); flashToast(`${files.length} image${files.length===1?'':'s'} added`); }
      };
      reader.onerror = () => { pending--; if (pending === 0) { save(); render(); } };
      reader.readAsDataURL(f);
    });
  };
  inp.click();
}

/* ─── render ─── */
function render() {
  // Header bits
  const t = $('#projectTitle');
  if (document.activeElement !== t) t.value = App.project.title;
  $('#panelCount').textContent = App.project.panels.length;
  $('#doneCount').textContent = App.project.panels.length;

  // Toolbar state sync
  $('#aspect').value = App.project.aspect;
  $$('#cols button').forEach(b => b.classList.toggle('on', b.dataset.cols === App.project.cols));
  $$('#gap button').forEach(b => b.classList.toggle('on', b.dataset.gap === App.project.gap));
  $('#showNumbers').checked = App.project.showNumbers;
  $('#showCaptions').checked = App.project.showCaptions;

  // Done bar visibility (need at least 2 panels with images to make a sheet useful — but show it any time we have content)
  $('#doneBar').style.display = App.project.panels.length > 0 ? 'flex' : 'none';

  // Board
  const board = $('#board');
  if (App.project.panels.length === 0) {
    board.innerHTML = `
      <div class="empty-state">
        <h2>Start your sheet</h2>
        <p>Add images one by one. They'll become panels in the order you add them. When you're done, compose them into one clean sheet.</p>
        <button class="btn primary" id="btnFirstAdd">+ Add your first image</button>
      </div>`;
    $('#btnFirstAdd').onclick = chooseMultiImages;
    return;
  }

  const cardsHtml = App.project.panels.map((p, i) => panelCardHtml(p, i)).join('');
  const addCardHtml = `
    <button class="add-card" id="addCard" title="Add another panel">
      <div class="plus">＋</div>
      <div class="lbl">Add panel</div>
    </button>`;

  board.innerHTML = `<div class="grid">${cardsHtml}${addCardHtml}</div>`;

  // Wire up
  board.querySelectorAll('[data-pid]').forEach(el => {
    const pid = el.dataset.pid;
    const action = el.dataset.action;
    if (action === 'open') {
      el.onclick = () => chooseImageFor(pid);
    } else if (action === 'up') {
      el.onclick = (e) => { e.stopPropagation(); movePanel(pid, -1); };
    } else if (action === 'down') {
      el.onclick = (e) => { e.stopPropagation(); movePanel(pid, 1); };
    } else if (action === 'replace') {
      el.onclick = (e) => { e.stopPropagation(); chooseImageFor(pid); };
    } else if (action === 'delete') {
      el.onclick = (e) => { e.stopPropagation(); removePanel(pid); };
    }
  });
  board.querySelectorAll('input[data-caption]').forEach(el => {
    el.oninput = () => setCaption(el.dataset.caption, el.value);
  });
  $('#addCard').onclick = chooseMultiImages;
}

function panelCardHtml(p, i) {
  const num = String(i + 1).padStart(2, '0');
  const imgSection = p.image
    ? `<div class="panel-img" data-pid="${p.id}" data-action="replace" title="Click to replace">
         <img src="${escapeHtml(p.image)}" alt=""/>
         <span class="panel-num">${num}</span>
         <div class="panel-tools">
           <button class="ptool" data-pid="${p.id}" data-action="up" title="Move up">▲</button>
           <button class="ptool" data-pid="${p.id}" data-action="down" title="Move down">▼</button>
           <button class="ptool del" data-pid="${p.id}" data-action="delete" title="Remove">×</button>
         </div>
       </div>`
    : `<div class="panel-img empty" data-pid="${p.id}" data-action="open" title="Click to add image">
         <div class="icon">＋</div>
         <div class="lbl">Choose image</div>
         <span class="panel-num">${num}</span>
         <div class="panel-tools">
           <button class="ptool del" data-pid="${p.id}" data-action="delete" title="Remove">×</button>
         </div>
       </div>`;
  return `
    <div class="panel">
      ${imgSection}
      <div class="panel-body">
        <input class="caption-input" data-caption="${p.id}"
               placeholder="Caption (optional)" value="${escapeHtml(p.caption)}" maxlength="120"/>
      </div>
    </div>`;
}

/* ─── compose final sheet ─── */
async function composeSheet() {
  const panels = App.project.panels.filter(p => p.image);
  if (panels.length === 0) {
    alert('Add at least one image first.');
    return;
  }

  const aspect = ASPECTS[App.project.aspect] || ASPECTS['16:9'];
  const aspectRatio = aspect.w / aspect.h;
  const n = panels.length;

  // Determine columns
  let cols;
  if (App.project.cols === 'auto') {
    cols = n <= 4 ? 2 : (n <= 9 ? 3 : 4);
    // for vertical aspect, prefer fewer columns
    if (aspectRatio < 1) cols = Math.min(cols, 3);
  } else {
    cols = Number(App.project.cols);
  }
  cols = Math.min(cols, n);
  const rows = Math.ceil(n / cols);

  // Cell sizing
  const targetSheetWidth = 1920;
  const padding = 56;
  const gap = GAPS[App.project.gap] || 18;
  const headerH = 100;
  const captionH = App.project.showCaptions ? 44 : 0;

  const availableW = targetSheetWidth - padding * 2 - gap * (cols - 1);
  const cellW = Math.floor(availableW / cols);
  const cellH = Math.round(cellW / aspectRatio);

  const canvasW = padding * 2 + cols * cellW + (cols - 1) * gap;
  const canvasH = padding * 2 + headerH + rows * (cellH + captionH) + (rows - 1) * gap;

  const canvas = document.createElement('canvas');
  canvas.width = canvasW;
  canvas.height = canvasH;
  const ctx = canvas.getContext('2d');

  // Background — calm warm cream
  ctx.fillStyle = '#F6F1E8';
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Subtle inner panel
  // Header text
  const title = (App.project.title || 'Story Sheet').trim();
  ctx.fillStyle = '#3A3A3A';
  ctx.font = '600 32px "Inter", system-ui, sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText(title, padding, padding);

  ctx.fillStyle = '#8B857A';
  ctx.font = '400 14px "Inter", system-ui, sans-serif';
  const subtitle = `${n} panel${n === 1 ? '' : 's'}  ·  ${App.project.aspect}  ·  ${new Date().toLocaleDateString()}`;
  ctx.fillText(subtitle, padding, padding + 44);

  // Subtle divider
  ctx.strokeStyle = '#E5DCC9';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padding, padding + headerH - 16);
  ctx.lineTo(canvasW - padding, padding + headerH - 16);
  ctx.stroke();

  // Pre-load all images
  const loadImage = (src) => new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
  const images = await Promise.all(panels.map(p => loadImage(p.image)));

  // Draw each cell
  for (let i = 0; i < n; i++) {
    const r = Math.floor(i / cols);
    const c = i % cols;
    const x = padding + c * (cellW + gap);
    const y = padding + headerH + r * (cellH + captionH + gap);

    // Cell shadow / background
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(x, y, cellW, cellH);

    const img = images[i];
    if (img) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, cellW, cellH);
      ctx.clip();
      const ir = img.width / img.height;
      const cr = cellW / cellH;
      let dw, dh, dx, dy;
      if (ir > cr) {
        dh = cellH;
        dw = dh * ir;
        dx = x + (cellW - dw) / 2;
        dy = y;
      } else {
        dw = cellW;
        dh = dw / ir;
        dx = x;
        dy = y + (cellH - dh) / 2;
      }
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.restore();
    }

    // Border
    ctx.strokeStyle = '#E5DCC9';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, cellW - 1, cellH - 1);

    // Number badge
    if (App.project.showNumbers) {
      const numText = String(i + 1).padStart(2, '0');
      ctx.font = '700 13px "Inter", system-ui, sans-serif';
      const numW = Math.ceil(ctx.measureText(numText).width) + 18;
      const numH = 26;
      const nx = x + 12;
      const ny = y + 12;
      // pill background
      ctx.fillStyle = 'rgba(255,255,255,0.94)';
      roundRect(ctx, nx, ny, numW, numH, 999);
      ctx.fill();
      ctx.strokeStyle = '#E5DCC9';
      ctx.stroke();
      ctx.fillStyle = '#6B9286';
      ctx.textBaseline = 'middle';
      ctx.fillText(numText, nx + 9, ny + numH / 2 + 1);
      ctx.textBaseline = 'top';
    }

    // Caption below
    if (App.project.showCaptions) {
      const cap = (panels[i].caption || '').trim();
      if (cap) {
        ctx.fillStyle = '#3A3A3A';
        ctx.font = '500 14px "Inter", system-ui, sans-serif';
        const text = cap.length > 90 ? cap.slice(0, 87) + '…' : cap;
        ctx.fillText(text, x + 4, y + cellH + 10);
      }
    }
  }

  // Footer watermark
  ctx.fillStyle = '#B5AE9E';
  ctx.font = '400 11px "Inter", system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('story sheet', canvasW - padding, canvasH - padding + 16);
  ctx.textAlign = 'left';

  // Display the result in a modal
  canvas.toBlob((blob) => {
    if (!blob) { alert('Could not compose sheet.'); return; }
    const url = URL.createObjectURL(blob);
    showResultModal(url, n);
  }, 'image/png');
}

function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

function safeName() {
  return (App.project.title || 'story-sheet').trim().replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '').toLowerCase() || 'story-sheet';
}

function showResultModal(url, panelCount) {
  const mount = $('#modalMount');
  mount.innerHTML = `
    <div class="modal-veil" id="veil">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <div>
            <h3>Your story sheet is ready</h3>
            <div class="sub">${panelCount} panel${panelCount === 1 ? '' : 's'} composed in order. Right-click the image to copy, or download below.</div>
          </div>
          <button class="btn ghost" id="closeModal">Close</button>
        </div>
        <div class="modal-body">
          <img src="${url}" alt="Composed story sheet"/>
        </div>
        <div class="modal-foot">
          <span class="meta" style="font-size:0.74rem;color:var(--muted)">${panelCount} panels</span>
          <span class="spacer"></span>
          <button class="btn" id="copyImg">Copy to clipboard</button>
          <button class="btn primary" id="downloadImg">Download PNG</button>
        </div>
      </div>
    </div>`;

  const close = () => { URL.revokeObjectURL(url); mount.innerHTML = ''; };
  $('#veil').onclick = close;
  $('#closeModal').onclick = close;
  $('#downloadImg').onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = safeName() + '.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    flashToast('Downloaded');
  };
  $('#copyImg').onclick = async () => {
    try {
      const blob = await fetch(url).then(r => r.blob());
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      flashToast('Copied to clipboard');
    } catch (e) {
      flashToast('Clipboard not available — use Download', true);
    }
  };
}

/* ─── toast ─── */
function flashToast(msg, warn) {
  const el = $('#toast');
  el.textContent = msg;
  el.style.background = warn ? 'var(--warn)' : 'var(--text)';
  el.classList.add('show');
  clearTimeout(flashToast._t);
  flashToast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

/* ─── wire up controls ─── */
$('#projectTitle').addEventListener('input', e => {
  App.project.title = e.target.value;
  save();
});
$('#aspect').addEventListener('change', e => {
  App.project.aspect = e.target.value;
  save();
});
$$('#cols button').forEach(b => b.addEventListener('click', () => {
  App.project.cols = b.dataset.cols;
  save(); render();
}));
$$('#gap button').forEach(b => b.addEventListener('click', () => {
  App.project.gap = b.dataset.gap;
  save(); render();
}));
$('#showNumbers').addEventListener('change', e => {
  App.project.showNumbers = e.target.checked;
  save();
});
$('#showCaptions').addEventListener('change', e => {
  App.project.showCaptions = e.target.checked;
  save();
});
$('#btnReset').addEventListener('click', reset);
$('#btnDone').addEventListener('click', composeSheet);

/* keyboard shortcut: Cmd/Ctrl + Enter to compose */
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    composeSheet();
  }
});

/* ─── boot ─── */
load();
render();
</script>
</body>
</html>
