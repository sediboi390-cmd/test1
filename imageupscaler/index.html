<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image Upscaler — Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --border: #e5e2da;
  --text: #1e1e1e;
  --muted: #888580;
  --radius: 14px;
  --accent: #a855f7;
  --accent-light: #f3e8ff;
  --accent-dim: rgba(168,85,247,0.12);
  --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-hover: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
}

html.dark {
  --bg: #111113;
  --surface: #1c1c1f;
  --border: #2a2a2e;
  --text: #ececef;
  --muted: #7a7a82;
  --accent-light: #3b1f5e;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}


header {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  font-size: 0.83rem;
  font-weight: 500;
  transition: all 0.15s;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-title .icon {
  width: 36px; height: 36px;
  background: var(--accent-dim);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}

.header-title h1 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.dark-toggle {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.dark-toggle:hover { border-color: var(--accent); color: var(--accent); }

main {
  max-width: 860px;
  margin: 28px auto 60px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}


/* ── Upload Zone ── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 56px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.upload-zone .dz-icon { font-size: 3.2rem; margin-bottom: 14px; }
.upload-zone h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
.upload-zone p { font-size: 0.85rem; color: var(--muted); margin-bottom: 22px; line-height: 1.6; }

.browse-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font: 600 0.88rem 'Inter', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
}
.browse-btn:hover { opacity: 0.85; }

/* ── Preview Card ── */
.preview-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: none;
  gap: 20px;
  align-items: flex-start;
}
.preview-card.visible { display: flex; }

.orig-thumb-wrap {
  flex-shrink: 0;
  width: 140px;
  height: 140px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: repeating-conic-gradient(#ddd 0% 25%, transparent 0% 50%) 0 0 / 14px 14px;
  display: flex; align-items: center; justify-content: center;
}
html.dark .orig-thumb-wrap {
  background: repeating-conic-gradient(#333 0% 25%, transparent 0% 50%) 0 0 / 14px 14px;
}
.orig-thumb-wrap img {
  max-width: 100%; max-height: 100%;
  display: block; object-fit: contain;
}

.orig-info { flex: 1; min-width: 0; }
.orig-info h3 {
  font-size: 0.95rem; font-weight: 600;
  margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.orig-info .meta {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 12px;
}
.meta-badge {
  font-size: 0.72rem; font-weight: 500;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--accent-dim);
  color: var(--accent);
}

.change-link {
  font-size: 0.78rem; color: var(--muted);
  text-decoration: underline; cursor: pointer;
  background: none; border: none; font-family: inherit;
}
.change-link:hover { color: var(--accent); }


/* ── Settings Panel ── */
.settings-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.settings-title {
  font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px;
}
.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}
.setting-group label {
  display: block;
  font-size: 0.8rem; font-weight: 600; margin-bottom: 8px;
  color: var(--text);
}
.btn-group {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.opt-btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font: 500 0.78rem 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.opt-btn:hover { border-color: var(--accent); color: var(--accent); }
.opt-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── Process Button ── */
.process-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  font: 700 1rem 'Inter', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.process-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
.process-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Progress ── */
.progress-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  text-align: center;
  display: none;
}
.progress-section.visible { display: block; }

.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--accent-dim);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.progress-label {
  font-size: 1rem; font-weight: 600; margin-bottom: 6px;
}
.progress-sub { font-size: 0.83rem; color: var(--muted); }


/* ── Result Section ── */
.result-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: none;
}
.result-section.visible { display: block; }

.result-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
}
.result-header h3 { font-size: 1rem; font-weight: 700; }
.result-badges { display: flex; gap: 8px; flex-wrap: wrap; }
.result-badge {
  font-size: 0.72rem; font-weight: 600;
  padding: 4px 12px;
  border-radius: 999px;
  background: rgba(16,185,129,0.12);
  color: #059669;
}
html.dark .result-badge { color: #34d399; background: rgba(52,211,153,0.12); }

.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
@media (max-width: 560px) { .compare-grid { grid-template-columns: 1fr; } }

.compare-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.compare-label {
  padding: 8px 12px;
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--muted);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.compare-label .dim-badge {
  font-size: 0.7rem; font-weight: 500;
  color: var(--text); text-transform: none; letter-spacing: 0;
}
.compare-img-wrap {
  background: repeating-conic-gradient(#ddd 0% 25%, transparent 0% 50%) 0 0 / 14px 14px;
  display: flex; align-items: center; justify-content: center;
  min-height: 200px; padding: 12px;
}
html.dark .compare-img-wrap {
  background: repeating-conic-gradient(#333 0% 25%, transparent 0% 50%) 0 0 / 14px 14px;
}
.compare-img-wrap img {
  max-width: 100%; max-height: 320px;
  display: block; border-radius: 4px;
}

.result-actions {
  display: flex; gap: 10px; flex-wrap: wrap;
}

.download-btn {
  flex: 1; min-width: 140px;
  padding: 11px 18px;
  border: none; border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font: 600 0.88rem 'Inter', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  text-decoration: none;
}
.download-btn:hover { opacity: 0.85; }

.try-again-btn {
  flex: 1; min-width: 140px;
  padding: 11px 18px;
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  font: 500 0.88rem 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.try-again-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Error Box ── */
.error-box {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 12px;
  padding: 18px 20px;
  display: none;
}
html.dark .error-box { background: #2d1515; border-color: #7f1d1d; }
.error-box.visible { display: block; }
.error-box .err-title {
  font-size: 0.9rem; font-weight: 700;
  color: #ef4444; margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.error-box .err-msg { font-size: 0.83rem; color: #b91c1c; line-height: 1.6; }
html.dark .error-box .err-msg { color: #fca5a5; }
html.dark .error-box .err-title { color: #f87171; }

/* ── Responsive ── */
@media (max-width: 600px) {
  header, main { padding-left: 16px; padding-right: 16px; }
  .preview-card.visible { flex-direction: column; }
  .orig-thumb-wrap { width: 100%; height: 160px; }
}
</style>
</head>
<body>


<header>
  <a href="../" class="back-btn">← Back</a>
  <div class="header-title">
    <div class="icon">🔮</div>
    <h1>Image Upscaler</h1>
  </div>
  <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
</header>

<main>

  <!-- Upload Zone -->
  <div class="upload-zone" id="uploadZone">
    <div class="dz-icon">🖼️</div>
    <h2>Drop your image here</h2>
    <p>Supports JPG, PNG and WEBP · Max 5 MB</p>
    <button class="browse-btn" id="browseBtn">📂 Choose Image</button>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" style="display:none"/>
  </div>

  <!-- Original Preview Card -->
  <div class="preview-card" id="previewCard">
    <div class="orig-thumb-wrap">
      <img id="origThumb" src="" alt="Original"/>
    </div>
    <div class="orig-info">
      <h3 id="origFileName">image.jpg</h3>
      <div class="meta" id="origMeta">
        <span class="meta-badge" id="badgeDims">–</span>
        <span class="meta-badge" id="badgeSize">–</span>
        <span class="meta-badge" id="badgeType">–</span>
      </div>
      <button class="change-link" id="changeBtn">↺ Choose different image</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel" style="display:none">
    <div class="settings-title">Upscale Settings</div>
    <div class="settings-grid">

      <div class="setting-group">
        <label>Scale Factor</label>
        <div class="btn-group" id="scaleGroup">
          <button class="opt-btn active" data-val="2">2× Upscale</button>
          <button class="opt-btn" data-val="4">4× Upscale</button>
        </div>
      </div>

      <div class="setting-group">
        <label>Noise Reduction</label>
        <div class="btn-group" id="noiseGroup">
          <button class="opt-btn" data-val="0">None</button>
          <button class="opt-btn active" data-val="1">Low</button>
          <button class="opt-btn" data-val="2">Medium</button>
          <button class="opt-btn" data-val="3">High</button>
        </div>
      </div>

      <div class="setting-group">
        <label>Style</label>
        <div class="btn-group" id="styleGroup">
          <button class="opt-btn active" data-val="photo">📷 Photo</button>
          <button class="opt-btn" data-val="anime">🎨 Artwork / Anime</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Process Button -->
  <button class="process-btn" id="processBtn" style="display:none">
    <span>✨</span> Upscale Image
  </button>

  <!-- Progress -->
  <div class="progress-section" id="progressSection">
    <div class="spinner"></div>
    <div class="progress-label" id="progressLabel">Uploading…</div>
    <div class="progress-sub" id="progressSub">Preparing your image</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox">
    <div class="err-title">⚠️ <span id="errTitle">Something went wrong</span></div>
    <div class="err-msg" id="errMsg"></div>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="result-header">
      <h3>✅ Upscale Complete!</h3>
      <div class="result-badges">
        <span class="result-badge" id="scaleBadge">2× Upscaled</span>
        <span class="result-badge" id="dimsBadge">–</span>
      </div>
    </div>

    <div class="compare-grid">
      <div class="compare-item">
        <div class="compare-label">
          Original
          <span class="dim-badge" id="origDimLabel">–</span>
        </div>
        <div class="compare-img-wrap">
          <img id="origCompare" src="" alt="Original"/>
        </div>
      </div>
      <div class="compare-item">
        <div class="compare-label">
          Upscaled
          <span class="dim-badge" id="upDimLabel">–</span>
        </div>
        <div class="compare-img-wrap">
          <img id="upscaledImg" src="" alt="Upscaled"/>
        </div>
      </div>
    </div>

    <div class="result-actions">
      <a class="download-btn" id="downloadBtn" href="#" download="upscaled.png">⬇ Download Upscaled</a>
      <button class="try-again-btn" id="tryAgainBtn">↩ Try Another Image</button>
    </div>
  </div>

</main>


<script>
// ── Dark mode ──────────────────────────────────────
const html = document.documentElement;
const darkBtn = document.getElementById('darkToggle');
const savedDark = localStorage.getItem('flow.darkMode');
if (savedDark === 'true' || (!savedDark && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  html.classList.add('dark'); darkBtn.textContent = '☀️';
}
darkBtn.addEventListener('click', () => {
  const d = html.classList.toggle('dark');
  darkBtn.textContent = d ? '☀️' : '🌙';
  localStorage.setItem('flow.darkMode', d);
});

// ── State ──────────────────────────────────────────
let currentFile = null;
let settings = { scale: 2, noise: 1, style: 'photo' };

// ── Element refs ───────────────────────────────────
const uploadZone    = document.getElementById('uploadZone');
const fileInput     = document.getElementById('fileInput');
const browseBtn     = document.getElementById('browseBtn');
const previewCard   = document.getElementById('previewCard');
const settingsPanel = document.getElementById('settingsPanel');
const processBtn    = document.getElementById('processBtn');
const progressSec   = document.getElementById('progressSection');
const progressLabel = document.getElementById('progressLabel');
const progressSub   = document.getElementById('progressSub');
const errorBox      = document.getElementById('errorBox');
const resultSec     = document.getElementById('resultSection');
const changeBtn     = document.getElementById('changeBtn');
const tryAgainBtn   = document.getElementById('tryAgainBtn');

// ── Upload handling ────────────────────────────────
browseBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

function handleFile(file) {
  // Validate type
  if (!file.type.match(/^image\/(jpeg|png|webp)$/)) {
    showError('Unsupported Format', 'Please upload a JPG, PNG or WEBP image.');
    return;
  }
  // Validate size (5 MB)
  if (file.size > 5 * 1024 * 1024) {
    showError('File Too Large', 'Please choose an image under 5 MB. Large images may take too long to process.');
    return;
  }

  currentFile = file;
  hideError();

  // Show preview
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    document.getElementById('origThumb').src = url;
    document.getElementById('origCompare').src = url;
    document.getElementById('origFileName').textContent = file.name;
    document.getElementById('badgeDims').textContent = img.naturalWidth + ' × ' + img.naturalHeight;
    document.getElementById('badgeSize').textContent = formatBytes(file.size);
    document.getElementById('badgeType').textContent = file.type.split('/')[1].toUpperCase();
    document.getElementById('origDimLabel').textContent = img.naturalWidth + ' × ' + img.naturalHeight;
  };
  img.src = url;

  uploadZone.style.display = 'none';
  previewCard.classList.add('visible');
  settingsPanel.style.display = 'block';
  processBtn.style.display = 'flex';
  resultSec.classList.remove('visible');
  progressSec.classList.remove('visible');
}

changeBtn.addEventListener('click', resetAll);
tryAgainBtn.addEventListener('click', resetAll);

function resetAll() {
  currentFile = null;
  fileInput.value = '';
  uploadZone.style.display = '';
  previewCard.classList.remove('visible');
  settingsPanel.style.display = 'none';
  processBtn.style.display = 'none';
  progressSec.classList.remove('visible');
  resultSec.classList.remove('visible');
  hideError();
}
</script>

<script>
// ── Settings buttons ───────────────────────────────
function setupGroup(groupId, settingKey) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const raw = btn.dataset.val;
      settings[settingKey] = isNaN(raw) ? raw : Number(raw);
    });
  });
}
setupGroup('scaleGroup', 'scale');
setupGroup('noiseGroup', 'noise');
setupGroup('styleGroup', 'style');

// ── Process ────────────────────────────────────────
processBtn.addEventListener('click', doUpscale);

async function doUpscale() {
  if (!currentFile) return;

  // Lock UI
  processBtn.disabled = true;
  settingsPanel.style.display = 'none';
  progressSec.classList.add('visible');
  resultSec.classList.remove('visible');
  hideError();

  setProgress('Uploading…', 'Sending image to AI service');

  try {
    const result = await upscaleWithDeepAI(currentFile);
    showResult(result);
  } catch (err) {
    progressSec.classList.remove('visible');
    const msg = err.message || 'Unknown error';
    let hint = '';
    if (msg.toLowerCase().includes('size') || msg.toLowerCase().includes('large')) {
      hint = ' Try a smaller image (under 2 MB for best results).';
    } else if (msg.toLowerCase().includes('rate') || msg.toLowerCase().includes('limit')) {
      hint = ' The free API limit has been reached. Please try again in a moment.';
    } else {
      hint = ' Please try again or use a different image.';
    }
    showError('Upscale Failed', msg + hint);
    settingsPanel.style.display = 'block';
    processBtn.disabled = false;
    processBtn.style.display = 'flex';
  }
}

async function upscaleWithDeepAI(file) {
  setProgress('Processing…', 'AI is enhancing your image — this may take 10–30 seconds');

  const formData = new FormData();
  formData.append('image', file);

  // Style determines which model to use
  const model = settings.style === 'anime' ? 'torch-srgan' : 'waifu2x';

  const response = await fetch('https://api.deepai.org/api/' + model, {
    method: 'POST',
    headers: { 'api-key': 'quickstart-QUdJIGlzIGZ1bg==' },
    body: formData
  });

  if (!response.ok) {
    const text = await response.text().catch(() => '');
    throw new Error('API error ' + response.status + (text ? ': ' + text.slice(0, 120) : ''));
  }

  const data = await response.json();

  if (data.err) throw new Error(data.err);
  if (!data.output_url) throw new Error('No output URL returned from API.');

  return data.output_url;
}

function setProgress(label, sub) {
  progressLabel.textContent = label;
  progressSub.textContent = sub;
}

function showResult(outputUrl) {
  progressSec.classList.remove('visible');
  processBtn.disabled = false;

  // Update result UI
  const scaleLabel = settings.scale + '× Upscaled';
  document.getElementById('scaleBadge').textContent = scaleLabel;

  // Load upscaled image to get dimensions
  const upImg = new Image();
  upImg.crossOrigin = 'anonymous';
  upImg.onload = () => {
    const w = upImg.naturalWidth, h = upImg.naturalHeight;
    document.getElementById('upDimLabel').textContent = w + ' × ' + h;
    document.getElementById('dimsBadge').textContent = w + ' × ' + h + ' px';
  };
  upImg.onerror = () => {};
  upImg.src = outputUrl;

  document.getElementById('upscaledImg').src = outputUrl;

  // Set download link
  const dlBtn = document.getElementById('downloadBtn');
  dlBtn.href = outputUrl;
  dlBtn.download = 'upscaled_' + (currentFile ? currentFile.name.replace(/\.[^.]+$/, '') : 'image') + '.png';
  // Open in new tab as fallback (CORS may block direct download)
  dlBtn.target = '_blank';

  resultSec.classList.add('visible');
  resultSec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Error helpers ──────────────────────────────────
function showError(title, msg) {
  document.getElementById('errTitle').textContent = title;
  document.getElementById('errMsg').textContent = msg;
  errorBox.classList.add('visible');
}
function hideError() {
  errorBox.classList.remove('visible');
}

// ── Utility ────────────────────────────────────────
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}
</script>
</body>
</html>
